name: CI
on:
  push:
    branches:
      - master
    tags: '*'
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest
    # Concurrency lives on the job (not the workflow) so it can reference
    # `matrix.backend`, which is only in scope at the job level.  Skip /
    # cancel intermediate builds per matrix entry independently.
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.backend }}
      cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
    strategy:
      fail-fast: false
      matrix:
        backend: [cpu, lavapipe]
    env:
      DISPLAY: ':0'
      RAYCORE_TEST_BACKEND: ${{ matrix.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install lavapipe (mesa software Vulkan)
        if: matrix.backend == 'lavapipe'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools spirv-tools
          echo "VK_DRIVER_FILES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json" >> "$GITHUB_ENV"
          # Confirm lavapipe is the active ICD
          vulkaninfo --summary | grep -E "deviceName|driverName" | head -4 || true
      - uses: julia-actions/setup-julia@v2
        with:
          version: 1
          arch: x64
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-runtest@v1
        with:
          # --check-bounds=auto: GPU kernels (lavapipe / OpenCL / pocl) crash with
          # --check-bounds=yes because bounds checking injects error paths that
          # can't compile to SPIR-V.
          check_bounds: auto
