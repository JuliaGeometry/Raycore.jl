# Sample workflow for building and deploying a VitePress site to GitHub Pages
#
name: Documenter

on:
  # Runs on pushes targeting the `main` branch. Change this to `master` if you're
  # using the `master` branch as the default branch.
  push:
    branches:
      - master
    tags: ['*']
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  statuses: write

# Concurrency: PR builds cancel previous in-flight builds for the same ref
# (latest commit wins; no point sitting in a long queue).  Master/tag pushes
# go through the production deploy path and must NOT cancel an in-flight
# deploy, so they keep `cancel-in-progress: false` via a different group.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install xvfb (GLFW pulled in by Lava needs an X display at module __init__)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Install lavapipe (mesa software Vulkan, needed for HW-RT cells in tutorials)
        run: |
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools spirv-tools
          echo "VK_DRIVER_FILES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json" >> "$GITHUB_ENV"
          xvfb-run --auto-servernum vulkaninfo --summary | grep -E "deviceName|driverName" | head -4 || true
      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
      - name: Pull Julia cache
        uses: julia-actions/cache@v2
      - name: Install custom documentation dependencies
        # xvfb-run wraps `julia` so GLFW's __init__ (transitively loaded via Lava
        # during precompilation of doc deps) can call glfwInit() on a headless runner.
        run: xvfb-run --auto-servernum julia --project=docs -e 'using Pkg; Pkg.instantiate(); Pkg.precompile(); Pkg.status()'
      #- name: Creating new mds from src
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # For authentication with GitHub Actions token
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }} # For authentication with SSH deploy key
          JULIA_DEBUG: "Documenter"
        run: xvfb-run --auto-servernum julia --project=docs/ --color=yes docs/make.jl
